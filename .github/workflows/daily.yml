name: Pulse Daily Automation

on:
  schedule:
    # 2:30 AM UTC translates precisely to 8:00 AM IST
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  run-pulse-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Codebase
        uses: actions/checkout@v4

      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Project Libraries
        run: pip install -r requirements.txt

      - name: Execute Main Script
        run: python bot.py

      - name: Store Result Log File
        uses: actions/upload-artifact@v4
        with:
          name: pulse-daily-summary
          path: daily_summary.txt
